<head>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
  <link rel="preconnect" href="https://www.google.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />

  <script>
    document.addEventListener("keydown", function (e) {
      if (e.key == "Escape") e.preventDefault();
    });
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeAny — type through your own books</title>
  <!-- fallback theme colors -->
  <style>
    :root {
      --bg-color: #0b1112;
      --main-color: #8be9b5;
      --caret-color: #75d8d1;
      --sub-color: #84958d;
      --sub-alt-color: #1d2a28;
      --text-color: #eef8f1;
      --error-color: #ff6b6b;
      --error-extra-color: #9e4b4b;
      --colorful-error-color: #ffc46b;
      --colorful-error-extra-color: #b3894b;
      --nav-focus-opacity: 0;
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/images/favicon/favicon.svg" />
  <link
    rel="icon"
    type="image/x-icon"
    sizes="32x32"
    href="/images/favicon/favicon.ico"
  />
  <meta name="name" content="TypeAny — type through your own books" />
  <meta
    name="description"
    content="Upload your own books (PDF, EPUB, TXT) and practice typing through them chapter by chapter — English and Chinese — with a clean, distraction-free typing experience."
  />
  <meta
    name="keywords"
    content="typing practice, typing test, type books, reading typing, PDF typing, EPUB, Chinese typing, wpm"
  />

  <meta property="og:title" content="TypeAny — type through your own books" />
  <meta property="og:type" content="website" />
  <meta
    property="og:description"
    content="Upload your own books and practice typing through them, chapter by chapter. English and Chinese."
  />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="TypeAny — type through your own books" />
  <meta name="darkreader-lock" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <style>
    /* 
      Layer order NEEDS to be here and one layer per line.
      This is because vite changes the order of the css imports,
      and the layer definition needs to be at the very very top, otherwise things break.
    */
    @layer normalize;
    @layer theme;
    @layer base;
    @layer components;
    @layer properties;
    @layer vendor;
    @layer custom-styles;
    @layer hidden;
    @layer utilities;
  </style>
  <link rel="stylesheet" class="testtesttest" href="styles/index.scss" />
  <link rel="stylesheet" class="testtest" href="styles/tailwind.css" />
